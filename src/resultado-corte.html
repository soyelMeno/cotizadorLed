<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado de corte — prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --graphite: #26282B;
    --graphite-soft: #4A4D51;
    --bone: #F3F0E9;
    --paper: #FFFFFF;
    --copper: #B5793D;
    --copper-soft: #E9D2B4;
    --cyan: #2FA79A;
    --cyan-soft: #CDEDE8;
    --amber: #C98A2E;
    --line: #E2DDD0;

    /* paleta de piezas: un color por medida única, consistente en todo el proyecto */
    --p1: #6B8F82;
    --p2: #C97B63;
    --p3: #5B7C99;
    --p4: #C9A23A;
    --p5: #8B6F9E;
    --p6: #4E8B8B;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bone);
    color: var(--graphite);
    font-family: 'Inter', sans-serif;
    padding: 32px 16px 80px;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .subtitulo {
    font-size: 14px;
    color: var(--graphite-soft);
    margin: 0 0 24px;
  }

  /* ---- Resumen ---- */
  .resumen {
    background: var(--graphite);
    color: var(--bone);
    border-radius: 14px;
    padding: 20px 22px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .resumen .dato { display: flex; flex-direction: column; gap: 2px; }
  .resumen .valor {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }
  .resumen .etiqueta {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #B9B5A8;
  }
  @media (max-width: 560px) {
    .resumen { grid-template-columns: repeat(2, 1fr); }
  }

  /* ---- Grupos (Canaletas / Tiras) ---- */
  .grupo { margin-bottom: 28px; }
  .grupo-titulo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .grupo-titulo .indicador {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .grupo-titulo.canaletas .indicador { background: var(--copper); }
  .grupo-titulo.tiras .indicador { background: var(--cyan); }

  /* ---- Tarjeta colapsable ---- */
  details.pieza-item {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  details.pieza-item[open] { border-color: #D8D0BC; }

  summary.encabezado {
    list-style: none;
    cursor: pointer;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  summary.encabezado::-webkit-details-marker { display: none; }
  summary.encabezado:focus-visible {
    outline: 2px solid var(--copper);
    outline-offset: -2px;
  }

  .encabezado-izq { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .num-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    background: var(--bone);
    color: var(--graphite-soft);
    border-radius: 6px;
    padding: 3px 7px;
    flex-shrink: 0;
  }
  .canaletas .num-badge { background: var(--copper-soft); color: #7A4F1F; }
  .tiras .num-badge { background: var(--cyan-soft); color: #17615A; }

  .resumen-mini {
    font-size: 13px;
    color: var(--graphite-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .resumen-mini .medidas { font-family: 'IBM Plex Mono', monospace; color: var(--graphite); }

  .chevron {
    flex-shrink: 0;
    transition: transform 0.15s ease;
    color: var(--graphite-soft);
  }
  details[open] .chevron { transform: rotate(180deg); }

  .cuerpo { padding: 4px 14px 16px; }

  /* ---- Barra de corte a escala ---- */
  .barra-contenedor {
    display: flex;
    height: 40px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .segmento {
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    position: relative;
    border-right: 1px solid rgba(255,255,255,0.35);
  }
  .segmento:last-child { border-right: none; }
  .segmento.sobrante {
    color: var(--graphite-soft);
    background: repeating-linear-gradient(
      45deg,
      var(--bone),
      var(--bone) 6px,
      #E7E2D3 6px,
      #E7E2D3 12px
    );
    font-weight: 500;
    font-size: 11px;
  }

  .marca-cm {
    display: flex;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--graphite-soft);
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="page">

  <h1>Resultado de la cotización</h1>
  <p class="subtitulo">Distribución de cortes optimizada — revisa cada bloque antes de imprimir</p>

  <div class="resumen">
    <div class="dato"><span class="valor" id="r-metros">14.7</span><span class="etiqueta">Metros lineales</span></div>
    <div class="dato"><span class="valor" id="r-canaletas">5</span><span class="etiqueta">Canaletas</span></div>
    <div class="dato"><span class="valor" id="r-tiras">3</span><span class="etiqueta">Tiras LED</span></div>
    <div class="dato"><span class="valor" id="r-conectores">21</span><span class="etiqueta">Conectores</span></div>
  </div>

  <div class="grupo" id="grupo-canaletas">
    <div class="grupo-titulo canaletas"><span class="indicador"></span> Canaletas</div>
  </div>

  <div class="grupo" id="grupo-tiras">
    <div class="grupo-titulo tiras"><span class="indicador"></span> Tiras LED</div>
  </div>

</div>

<script>
// ---- Datos de ejemplo (mock) — así llegará el resultado real de optimizer.js ----
const STOCK_CANALETA = 300; // cm, tomado del catálogo (ej. C7X17)
const STOCK_TIRA = 500;     // cm, tomado del catálogo (ej. TC24)

const canaletas = [
  { piezas: [195, 105] },
  { piezas: [195, 105] },
  { piezas: [120, 120, 45] },
  { piezas: [120, 120, 58] },
  { piezas: [65] },
];

const tiras = [
  { piezas: [195, 195, 105] },
  { piezas: [120, 120, 120, 120] },
  { piezas: [105, 45, 65, 58] },
];

// Color consistente por medida única en TODO el proyecto
const paletaPiezas = ['--p1', '--p2', '--p3', '--p4', '--p5', '--p6'];
const coloresPorMedida = {};
function colorDe(medida) {
  if (!coloresPorMedida[medida]) {
    const idx = Object.keys(coloresPorMedida).length % paletaPiezas.length;
    coloresPorMedida[medida] = `var(${paletaPiezas[idx]})`;
  }
  return coloresPorMedida[medida];
}

function renderGrupo(contenedorId, items, stockLength, prefijo, claseGrupo) {
  const contenedor = document.getElementById(contenedorId);
  items.forEach((item, i) => {
    const usado = item.piezas.reduce((a, b) => a + b, 0);
    const sobrante = stockLength - usado;

    const det = document.createElement('details');
    det.className = `pieza-item ${claseGrupo}`;
    if (i === 0) det.open = true;

    const medidasTexto = item.piezas.join(' + ') + (sobrante > 0 ? ` (sobra ${sobrante}cm)` : '');

    det.innerHTML = `
      <summary class="encabezado">
        <div class="encabezado-izq">
          <span class="num-badge">${prefijo} ${i + 1}</span>
          <span class="resumen-mini">${item.piezas.length} pieza${item.piezas.length > 1 ? 's' : ''} · <span class="medidas">${medidasTexto}</span></span>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </summary>
      <div class="cuerpo">
        <div class="barra-contenedor"></div>
        <div class="marca-cm"><span>0</span><span>${stockLength} cm</span></div>
      </div>
    `;

    const barra = det.querySelector('.barra-contenedor');
    item.piezas.forEach(medida => {
      const seg = document.createElement('div');
      seg.className = 'segmento';
      seg.style.width = (medida / stockLength * 100) + '%';
      seg.style.background = colorDe(medida);
      seg.textContent = medida;
      barra.appendChild(seg);
    });
    if (sobrante > 0) {
      const seg = document.createElement('div');
      seg.className = 'segmento sobrante';
      seg.style.width = (sobrante / stockLength * 100) + '%';
      seg.textContent = sobrante > 30 ? `sobra ${sobrante}` : '';
      barra.appendChild(seg);
    }

    contenedor.appendChild(det);
  });
}

renderGrupo('grupo-canaletas', canaletas, STOCK_CANALETA, 'Canaleta', 'canaletas');
renderGrupo('grupo-tiras', tiras, STOCK_TIRA, 'Led', 'tiras');
</script>
</body>
</html>
